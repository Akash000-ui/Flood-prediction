<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Alerts & Notifications</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .notifications-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .notification-alert {
            background: white;
            border-radius: 15px;
            padding:30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-left: 8px solid;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn{
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-alert.high {
            border-left-color: #ef4444;
            background: linear-gradient(135deg, #fff 0%, #fef2f2 100%);
        }

        .notification-alert.medium {
            border-left-color: #fbbf24;
            background: linear-gradient(135deg, #fff 0%, #fefce8 100%);
        }

        .notification-alert.low {
            border-left-color: #4ade80;
            background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
        }

        .notification-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .notification-icon {
            font-size: 48px;
            margin-right: 20px;
        }

        .notification-title {
            flex: 1;
        }

        .notification-title h2 {
            margin: 0;
            color: #1e293b;
            font-size: 28px;
        }

        .notification-title p {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 14px;
        }

        .notification-badge {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        .notification-badge.high {
            background: #ef4444;
            color: white;
        }

        .notification-badge.medium {
            background: #fbbf24;
            color: #78350f;
        }

        .notification-badge.low {
            background: #4ade80;
            color: #14532d;
        }

        .notification-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .notification-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .notification-section h3 {
            margin: 0 0 15px 0;
            color: #334155;
            font-size: 18px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #64748b;
            font-weight: 500;
        }

        .detail-value {
            color: #1e293b;
            font-weight: bold;
        }

        .recommendations {
            grid-column: 1 / -1;
        }

        .recommendations ul {
            margin: 0;
            padding-left: 20px;
        }

        .recommendations li {
            padding: 8px 0;
            color: #475569;
            line-height: 1.6;
        }

        .no-notifications {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .no-notifications-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .no-notifications h2 {
            color: #64748b;
            margin-bottom: 10px;
        }

        .no-notifications p {
            color: #94a3b8;
        }

        .back-button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .probability-meter {
            margin: 20px 0;
        }

        .probability-bar {
            height: 30px;
            background: #e2e8f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .probability-fill {
            height: 100%;
            transition: width 0.5s ease-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-weight: bold;
        }

        .probability-fill.high {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }

        .probability-fill.medium {
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
        }

        .probability-fill.low {
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .feature-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .feature-box-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .feature-box-label {
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .feature-box-value {
            color: #1e293b;
            font-size: 22px;
            font-weight: bold;
        }

        .clear-btn {
            float: right;
            padding: 8px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #dc2626;
        }

        @media (max-width: 768px) {
            .notification-body {
                grid-template-columns: 1fr;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }

            .notification-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notification-badge {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔔 Flood Alerts & Notifications</h1>
        <p>High-risk flood predictions and alerts</p>
    </div>

    <div class="notifications-container">
        <div style="margin-bottom: 20px;">
            <a href="/" class="back-button">← Back to Map</a>
            <button class="clear-btn" onclick="clearAllNotifications()">Clear All</button>
        </div>

        <div id="notificationsList">
            <!-- Notifications will be dynamically added here -->
        </div>

        <div class="no-notifications" id="noNotifications">
            <div class="no-notifications-icon">🔕</div>
            <h2>No Flood Alerts Yet</h2>
            <p>When flood predictions with probability above 50% are detected, they will appear here.</p>
            <p style="margin-top: 20px;">
                <a href="/" style="color: #667eea; text-decoration: none; font-weight: 600;">
                    Go to map and make a prediction →
                </a>
            </p>
        </div>
    </div>

    <script>
        // Load notifications from localStorage
        function loadNotifications() {
            const notifications = JSON.parse(localStorage.getItem('floodNotifications') || '[]');
            const container = document.getElementById('notificationsList');
            const noNotifications = document.getElementById('noNotifications');

            if (notifications.length === 0) {
                container.innerHTML = '';
                noNotifications.style.display = 'block';
                return;
            }

            noNotifications.style.display = 'none';
            
            // Sort by timestamp (newest first)
            notifications.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            container.innerHTML = notifications.map((notif, index) => {
                const riskClass = notif.risk_level.toLowerCase();
                const probability = (notif.flood_probability * 100).toFixed(1);
                const date = new Date(notif.timestamp);
                const formattedDate = date.toLocaleString();

                let icon = '🔴';
                if (riskClass === 'medium') icon = '🟡';
                if (riskClass === 'low') icon = '🟢';

                return `
                    <div class="notification-alert ${riskClass}">
                        <div class="notification-header">
                            <div style="display: flex; align-items: center; flex: 1;">
                                <div class="notification-icon">${icon}</div>
                                <div class="notification-title">
                                    <h2>${notif.risk_level} RISK ALERT</h2>
                                    <p>📍 Location: ${notif.location.lat.toFixed(4)}°, ${notif.location.lon.toFixed(4)}° • ${formattedDate}</p>
                                </div>
                            </div>
                            <div>
                                <span class="notification-badge ${riskClass}">${notif.risk_level} RISK</span>
                            </div>
                        </div>

                        <div class="probability-meter">
                            <div class="probability-bar">
                                <div class="probability-fill ${riskClass}" style="width: ${probability}%;">
                                    ${probability}%
                                </div>
                            </div>
                        </div>

                        <div class="notification-body">
                            <div class="notification-section">
                                <h3>📊 Environmental Conditions</h3>
                                <div class="features-grid">
                                    <div class="feature-box">
                                        <div class="feature-box-icon">🌧️</div>
                                        <div class="feature-box-label">Rainfall (7-day)</div>
                                        <div class="feature-box-value">${notif.features.rainfall_7d_mm.toFixed(1)} mm</div>
                                    </div>
                                    <div class="feature-box">
                                        <div class="feature-box-icon">💧</div>
                                        <div class="feature-box-label">Soil Moisture</div>
                                        <div class="feature-box-value">${notif.features.soil_moisture.toFixed(1)}</div>
                                    </div>
                                    <div class="feature-box">
                                        <div class="feature-box-icon">⛰️</div>
                                        <div class="feature-box-label">Elevation</div>
                                        <div class="feature-box-value">${notif.features.elevation_m.toFixed(1)} m</div>
                                    </div>
                                    <div class="feature-box">
                                        <div class="feature-box-icon">📐</div>
                                        <div class="feature-box-label">Slope</div>
                                        <div class="feature-box-value">${notif.features.slope_deg.toFixed(1)}°</div>
                                    </div>
                                </div>
                            </div>

                            <div class="notification-section">
                                <h3>📍 Location Details</h3>
                                <div class="detail-item">
                                    <span class="detail-label">Latitude</span>
                                    <span class="detail-value">${notif.location.lat.toFixed(6)}°</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Longitude</span>
                                    <span class="detail-value">${notif.location.lon.toFixed(6)}°</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Probability</span>
                                    <span class="detail-value">${probability}%</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Risk Level</span>
                                    <span class="detail-value">${notif.risk_level}</span>
                                </div>
                                ${notif.data_source ? `
                                <div class="detail-item">
                                    <span class="detail-label">Data Source</span>
                                    <span class="detail-value">${notif.data_source}</span>
                                </div>
                                ` : ''}
                            </div>

                            <div class="notification-section recommendations">
                                <h3>⚠️ Recommended Actions</h3>
                                <ul>
                                    <li><strong>Monitor weather updates closely</strong> - Stay informed about changing conditions</li>
                                    <li><strong>Prepare emergency supplies</strong> - Water, food, first aid kit, flashlight, batteries</li>
                                    <li><strong>Evacuation kit ready</strong> - Important documents, medications, valuables</li>
                                    <li><strong>Stay informed</strong> - Local flood warnings and emergency broadcasts</li>
                                    <li><strong>Avoid flood-prone areas</strong> - Stay away from low-lying zones and water bodies</li>
                                    <li><strong>Emergency contacts</strong> - Keep phone numbers readily available</li>
                                    ${riskClass === 'high' ? '<li><strong style="color: #ef4444;">URGENT: Consider evacuation</strong> - Move to higher ground immediately if advised</li>' : ''}
                                </ul>
                            </div>
                        </div>

                        <div style="text-align: right; margin-top: 20px;">
                            <button class="clear-btn" onclick="removeNotification(${index})" style="float: none; background: #94a3b8;">
                                Dismiss
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeNotification(index) {
            const notifications = JSON.parse(localStorage.getItem('floodNotifications') || '[]');
            notifications.splice(index, 1);
            localStorage.setItem('floodNotifications', JSON.stringify(notifications));
            loadNotifications();
        }

        function clearAllNotifications() {
            if (confirm('Are you sure you want to clear all notifications?')) {
                localStorage.removeItem('floodNotifications');
                loadNotifications();
            }
        }

        // Load notifications on page load
        document.addEventListener('DOMContentLoaded', loadNotifications);

        // Listen for new notifications from other tabs
        window.addEventListener('storage', (e) => {
            if (e.key === 'floodNotifications') {
                loadNotifications();
            }
        });
    </script>
</body>
</html>
